name: Update Meetings & Deploy

on:
  schedule:
    # Every 4 hours. Catches freshly-uploaded videos in the same evening so
    # auto-captions have ~6 attempts in the first 24 hours before falling
    # back to agenda-only.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill ALL historical meetings (true/false)'
        required: false
        default: 'false'
      days:
        description: 'Process meetings from last N days (e.g. 21). Ignored if backfill=true.'
        required: false
        default: ''
      reprocess:
        description: 'Comma-separated video IDs to force reprocess'
        required: false
        default: ''
      inject_transcript:
        description: 'Video ID to inject transcript for (file must be in transcripts/VIDEO_ID.txt)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Deno
        # yt-dlp needs a JavaScript runtime to solve YouTube's "n challenge"
        # that wraps subtitle URLs. Without it, fetches fall back to the
        # "Only images are available" path and the summarizer treats videos
        # as having no captions even when they do.
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Smoke-check upstream data sources
        # Non-strict: warn if anything's off but don't block the run. Schema
        # breakage in CivicClerk / AgendaCenter / BoardBook will print loud
        # FAIL lines that show up at the top of the run log.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python smoke_check.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Write YouTube cookies
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt
            echo "Cookies file written."
          else
            echo "No YOUTUBE_COOKIES secret set — transcripts may fail on CI IPs."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Reprocess specific videos (if requested)
        env:
          REPROCESS_IDS: ${{ github.event.inputs.reprocess }}
        run: python reprocess.py

      - name: Run meeting summarizer
        id: summarize
        # Don't abort the workflow if summarization fails (e.g. API credit
        # exhaustion, June 2026): the site should still rebuild and deploy
        # with whatever data we have. A final step re-surfaces the failure.
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_COOKIES_FILE: /tmp/yt-cookies.txt
          # Whisper is local-only; the lib isn't installed in CI (saves ~150 MB
          # download per run) and the summarizer no-ops the fallback when this
          # flag is false. Set to "true" locally if you want audio transcription.
          USE_WHISPER_FALLBACK: "false"
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python marathon_meeting_summarizer.py --backfill
          elif [ -n "${{ github.event.inputs.days }}" ]; then
            python marathon_meeting_summarizer.py --days ${{ github.event.inputs.days }}
          else
            python marathon_meeting_summarizer.py --days 14
          fi

      - name: Override agenda-only meetings with transcripts
        id: inject_transcripts
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ ! -d transcripts ] || [ -z "$(ls transcripts/*.txt 2>/dev/null)" ]; then
            echo "No transcript files found — skipping."
            exit 0
          fi
          for TFILE in transcripts/*.txt; do
            VID=$(basename "$TFILE" .txt)
            echo "Processing transcript for: $VID"
            python inject_transcript.py --video-id "$VID" --transcript "$TFILE"
            echo ""
          done

      - name: Inject meeting summaries into JSX
        run: |
          echo "Working directory: $(pwd)"
          echo "Files present:"
          ls -la *.json summaries/ 2>/dev/null || true
          echo "processed_meetings.json contents (first 200 chars):"
          head -c 200 processed_meetings.json 2>/dev/null || echo "FILE NOT FOUND"
          echo ""
          python inject_meetings.py

      - name: Update upcoming meetings
        run: python update_upcoming.py

      - name: Generate weekly digest PNG
        # Newsletter image of the coming week's meetings. Written to public/ so
        # the Vite build copies it into dist/ → served at /marathon-meetings/digest.png.
        # continue-on-error: a digest failure must never block the deploy.
        continue-on-error: true
        run: python generate_digest.py --out public/digest.png

      - name: Commit data and deploy assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f src/data/meetings.json || true
          git add -f src/data/upcoming.json || true
          git add -f injected_meetings.json || true
          git add -f processed_meetings.json || true
          git add -f summaries/ || true
          git add -f public/digest.png || true
          git status
          git diff --staged --quiet || git commit -m "chore: update meetings data [skip ci]"
          git push || true

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create agenda-only issue (if any)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f agenda_only_report.json ]; then
            echo "No agenda-only report — skipping issue creation."
            exit 0
          fi
          COUNT=$(python -c "import json; d=json.load(open('agenda_only_report.json')); print(len(d.get('agenda_only',[])))")
          if [ "$COUNT" = "0" ]; then
            echo "No agenda-only meetings — skipping issue creation."
            exit 0
          fi
          BODY=$(python -c "
          import json
          d = json.load(open('agenda_only_report.json'))
          lines = ['## Agenda-Only Meetings Need Transcripts\n']
          lines.append(f'{len(d[\"agenda_only\"])} meeting(s) were summarized from agenda documents only.')
          lines.append('These summaries show what was *scheduled*, not what *actually happened*.\n')
          lines.append('**To fix:** Grab the transcript from the YouTube app and run:')
          lines.append('\`\`\`')
          lines.append('python inject_transcript.py --video-id VIDEO_ID --transcript transcript.txt')
          lines.append('\`\`\`\n')
          lines.append('| Meeting | Source | Status |')
          lines.append('|---------|--------|--------|')
          for m in d['agenda_only']:
              vote = ' (has votes)' if m.get('_source') == 'agenda_with_votes' else ''
              lines.append(f'| [{m[\"title\"]}]({m[\"url\"]}) | {m[\"source\"]} | Agenda only{vote} |')
          if d.get('transcript_based'):
              lines.append(f'\n---\n*{len(d[\"transcript_based\"])} other meeting(s) have full transcripts.*')
          print('\n'.join(lines))
          ")
          # Maintain ONE standing status issue instead of filing a new one every
          # run (6x/day created hundreds of duplicates). Update the open issue
          # if present; only create when none exists.
          EXISTING=$(gh issue list --state open --search "Agenda-only meetings need transcripts in:title" --json number --jq '.[0].number // empty')
          TITLE="📋 Agenda-only meetings need transcripts (updated $(date +%Y-%m-%d))"
          if [ -n "$EXISTING" ]; then
            echo "Updating standing issue #$EXISTING"
            gh issue edit "$EXISTING" --title "$TITLE" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "transcript-needed" 2>/dev/null || \
            gh issue create --title "$TITLE" --body "$BODY"
          fi

      - name: Surface summarizer failures
        # The summarize/inject steps use continue-on-error so the site still
        # deploys on API outages — but the run must still go red so failures
        # aren't silent. This runs AFTER deploy.
        if: steps.summarize.outcome == 'failure' || steps.inject_transcripts.outcome == 'failure'
        run: |
          echo "::error::Summarizer or transcript-injection failed earlier in this run (site still deployed with existing data). Check the step logs above — common cause: Anthropic API credit exhaustion."
          exit 1
