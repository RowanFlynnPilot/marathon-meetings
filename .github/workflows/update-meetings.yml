name: Update Meetings & Deploy

on:
  schedule:
    - cron: '0 2 * * *'   # nightly 9pm CT (2am UTC)
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill ALL historical meetings (true/false)'
        required: false
        default: 'false'
      days:
        description: 'Process meetings from last N days (e.g. 21). Ignored if backfill=true.'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install anthropic yt-dlp requests beautifulsoup4 pillow youtube-transcript-api pdfplumber faster-whisper

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Write YouTube cookies
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt
            echo "Cookies file written."
          else
            echo "No YOUTUBE_COOKIES secret set — transcripts may fail on CI IPs."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Run meeting summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_COOKIES_FILE: /tmp/yt-cookies.txt
          USE_WHISPER_FALLBACK: "false"
          WHISPER_MODEL: "tiny"
          WHISPER_SOURCES: "marathon"
          WHISPER_DAYS: "14"
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python marathon_meeting_summarizer.py --backfill
          elif [ -n "${{ github.event.inputs.days }}" ]; then
            python marathon_meeting_summarizer.py --days ${{ github.event.inputs.days }}
          else
            python marathon_meeting_summarizer.py --days 14
          fi

      - name: Inject meeting summaries into JSX
        run: |
          echo "Working directory: $(pwd)"
          echo "Files present:"
          ls -la *.json summaries/ 2>/dev/null || true
          echo "processed_meetings.json contents (first 200 chars):"
          head -c 200 processed_meetings.json 2>/dev/null || echo "FILE NOT FOUND"
          echo ""
          echo "{}" > injected_meetings.json
          python inject_meetings.py

      - name: Update upcoming meetings
        run: python update_upcoming.py marathon-meetings.jsx

      - name: Commit JSX and deploy assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f marathon-meetings.jsx || true
          git add -f injected_meetings.json || true
          git status
          git diff --staged --quiet || git commit -m "chore: update meetings JSX [skip ci]"
          git push || true

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
