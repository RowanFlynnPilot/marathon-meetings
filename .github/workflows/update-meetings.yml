name: Update Meetings & Deploy

on:
  schedule:
    - cron: '0 2 * * *'   # nightly 9pm CT (2am UTC)
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill ALL historical meetings (true/false)'
        required: false
        default: 'false'
      days:
        description: 'Process meetings from last N days (e.g. 21). Ignored if backfill=true.'
        required: false
        default: ''
      reprocess:
        description: 'Comma-separated video IDs to force reprocess'
        required: false
        default: ''
      inject_transcript:
        description: 'Video ID to inject transcript for (file must be in transcripts/VIDEO_ID.txt)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install anthropic yt-dlp requests beautifulsoup4 pillow youtube-transcript-api pdfplumber faster-whisper

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Write YouTube cookies
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt
            echo "Cookies file written."
          else
            echo "No YOUTUBE_COOKIES secret set — transcripts may fail on CI IPs."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Reprocess specific videos (if requested)
        env:
          REPROCESS_IDS: ${{ github.event.inputs.reprocess }}
        run: python reprocess.py

      - name: Run meeting summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_COOKIES_FILE: /tmp/yt-cookies.txt
          USE_WHISPER_FALLBACK: "false"
          WHISPER_MODEL: "tiny"
          WHISPER_SOURCES: "marathon,wausau,weston"
          WHISPER_DAYS: "14"
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python marathon_meeting_summarizer.py --backfill
          elif [ -n "${{ github.event.inputs.days }}" ]; then
            python marathon_meeting_summarizer.py --days ${{ github.event.inputs.days }}
          else
            python marathon_meeting_summarizer.py --days 14
          fi

      - name: Override agenda-only meetings with transcripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Step 1: Process merged multi-part transcripts
          if [ -f transcripts/merged/merge_config.json ]; then
            echo "=== Processing merged multi-part meetings ==="
            python -c "
          import json, subprocess, sys, re
          config = json.load(open('transcripts/merged/merge_config.json'))
          for merge in config['merges']:
              vid = merge['keep_id']
              tfile = merge['merged_transcript']
              title = merge['title']
              print(f'Merging: {title} (keep={vid}, remove={merge[\"remove_ids\"]})')
              r = subprocess.run(
                  [sys.executable, 'inject_transcript.py',
                   '--video-id', vid, '--transcript', tfile,
                   '--source', merge['source'], '--jsx', 'marathon-meetings.jsx'],
                  capture_output=True, text=True
              )
              print(r.stdout)
              if r.stderr: print(r.stderr)
              # Remove the other parts from the JSX
              with open('marathon-meetings.jsx', encoding='utf-8') as f:
                  jsx = f.read()
              for rid in merge['remove_ids']:
                  # Remove entry block for this ID
                  pattern = r',?\n  \{\n    id: \"' + re.escape(rid) + r'\".*?\n  \}'
                  jsx = re.sub(pattern, '', jsx, count=1, flags=re.DOTALL)
                  print(f'  Removed part: {rid}')
              with open('marathon-meetings.jsx', 'w', encoding='utf-8') as f:
                  f.write(jsx)
          "
            echo ""
          fi

          # Step 2: Process individual transcript files
          if [ ! -d transcripts ] || [ -z "$(ls transcripts/*.txt 2>/dev/null)" ]; then
            echo "No individual transcript files found — skipping."
            exit 0
          fi
          # Get list of already-merged IDs to skip
          MERGED_IDS=""
          if [ -f transcripts/merged/merge_config.json ]; then
            MERGED_IDS=$(python -c "
          import json
          config = json.load(open('transcripts/merged/merge_config.json'))
          ids = set()
          for m in config['merges']:
              ids.add(m['keep_id'])
              ids.update(m['remove_ids'])
          print(' '.join(ids))
          ")
          fi
          for TFILE in transcripts/*.txt; do
            VID=$(basename "$TFILE" .txt)
            if echo "$MERGED_IDS" | grep -qw "$VID"; then
              echo "Skipping $VID (handled by merge)"
              continue
            fi
            echo "Processing transcript for: $VID"
            python inject_transcript.py --video-id "$VID" --transcript "$TFILE" --jsx marathon-meetings.jsx
            echo ""
          done

      - name: Inject meeting summaries into JSX
        run: |
          echo "Working directory: $(pwd)"
          echo "Files present:"
          ls -la *.json summaries/ 2>/dev/null || true
          echo "processed_meetings.json contents (first 200 chars):"
          head -c 200 processed_meetings.json 2>/dev/null || echo "FILE NOT FOUND"
          echo ""
          echo "{}" > injected_meetings.json
          python inject_meetings.py

      - name: Update upcoming meetings
        run: python update_upcoming.py marathon-meetings.jsx

      - name: Commit JSX and deploy assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f marathon-meetings.jsx || true
          git add -f injected_meetings.json || true
          git status
          git diff --staged --quiet || git commit -m "chore: update meetings JSX [skip ci]"
          git push || true

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create agenda-only issue (if any)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f agenda_only_report.json ]; then
            echo "No agenda-only report — skipping issue creation."
            exit 0
          fi
          COUNT=$(python -c "import json; d=json.load(open('agenda_only_report.json')); print(len(d.get('agenda_only',[])))")
          if [ "$COUNT" = "0" ]; then
            echo "No agenda-only meetings — skipping issue creation."
            exit 0
          fi
          BODY=$(python -c "
          import json
          d = json.load(open('agenda_only_report.json'))
          lines = ['## Agenda-Only Meetings Need Transcripts\n']
          lines.append(f'{len(d[\"agenda_only\"])} meeting(s) were summarized from agenda documents only.')
          lines.append('These summaries show what was *scheduled*, not what *actually happened*.\n')
          lines.append('**To fix:** Grab the transcript from the YouTube app and run:')
          lines.append('\`\`\`')
          lines.append('python inject_transcript.py --video-id VIDEO_ID --transcript transcript.txt')
          lines.append('\`\`\`\n')
          lines.append('| Meeting | Source | Status |')
          lines.append('|---------|--------|--------|')
          for m in d['agenda_only']:
              vote = ' (has votes)' if m.get('_source') == 'agenda_with_votes' else ''
              lines.append(f'| [{m[\"title\"]}]({m[\"url\"]}) | {m[\"source\"]} | Agenda only{vote} |')
          if d.get('transcript_based'):
              lines.append(f'\n---\n*{len(d[\"transcript_based\"])} other meeting(s) have full transcripts.*')
          print('\n'.join(lines))
          ")
          gh issue create \
            --title "📋 Agenda-only meetings need transcripts ($(date +%Y-%m-%d))" \
            --body "$BODY" \
            --label "transcript-needed" 2>/dev/null || \
          gh issue create \
            --title "📋 Agenda-only meetings need transcripts ($(date +%Y-%m-%d))" \
            --body "$BODY"
